name: Java JNI CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: lab16

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Generate JNI headers
        run: |
          mkdir -p native-headers target/classes
          javac -encoding UTF-8 -h native-headers \
            -d target/classes \
            src/main/java/ua/khpi/oop/lab16/service/NativeAverageCalculator.java

      - name: Build native library
        run: |
          mkdir -p build/native
          clang++ -std=c++17 -shared -fPIC \
            -I"$JAVA_HOME/include" \
            -I"$JAVA_HOME/include/linux" \
            -Inative-headers \
            native/nativeaverage.cpp \
            -o build/native/libnativeaverage.so

      - name: Build Java project
        run: mvn -B compile

      - name: Run tests
        run: mvn -B test
